name: CI Pipeline - ВашеПрізвище

on:
  push:
    branches: [ main ]
  workflow_dispatch:    

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run Python script (аналог "Build with Gradle")
        run: python main.py

      - name: Upload artifact (замість APK)
        uses: actions/upload-artifact@v4
        with:
          name: result-file
          path: result.txt
